<!DOCTYPE html>
<html lang="en" class="govuk-template">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="https://frontend.design-system.service.gov.uk/stylesheets/govuk-frontend-5.2.0.min.css">
  <style>
    .app-navigation {
      background-color: #f3f2f1;
      padding: 15px 0;
      border-bottom: 1px solid #b1b4b6;
    }
    .app-navigation__list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .app-navigation__list-item {
      display: inline-block;
      margin-right: 20px;
    }
    .app-navigation__link {
      font-family: "GDS Transport", arial, sans-serif;
      font-size: 16px;
      color: #1d70b8;
      text-decoration: none;
    }
    .app-navigation__link:hover {
      text-decoration: underline;
      color: #003078;
    }
    .app-navigation__link--active {
      font-weight: 700;
      color: #0b0c0c;
    }
    .govuk-main-wrapper {
      padding-top: 40px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 30px;
      font-family: "GDS Transport", arial, sans-serif;
    }
    table th, table td {
      padding: 10px 20px 10px 0;
      border-bottom: 1px solid #b1b4b6;
      text-align: left;
      font-size: 16px;
    }
    table th {
      font-weight: 700;
    }
    .govuk-tag--green {
      background-color: #00703c;
    }
  </style>
</head>
<body class="govuk-template__body">
  <a href="#main-content" class="govuk-skip-link">Skip to main content</a>

  <header class="govuk-header" role="banner" data-module="govuk-header">
    <div class="govuk-header__container govuk-width-container">
      <div class="govuk-header__content">
        <a href="{{ site.baseurl }}/" class="govuk-header__link govuk-header__service-name">
          {{ site.title }}
        </a>
      </div>
    </div>
  </header>

  <nav class="app-navigation">
    <div class="govuk-width-container">
      <ul class="app-navigation__list">
        <li class="app-navigation__list-item">
          <a class="app-navigation__link{% if page.url == '/' %} app-navigation__link--active{% endif %}" href="{{ site.baseurl }}/">Home</a>
        </li>
        {% for service in site.services %}
        <li class="app-navigation__list-item">
          <a class="app-navigation__link{% if page.url == service.url %} app-navigation__link--active{% endif %}" href="{{ site.baseurl }}{{ service.url }}">{{ service.title }}</a>
        </li>
        {% endfor %}
        <li class="app-navigation__list-item">
          <a class="app-navigation__link{% if page.url == '/getting-started/' %} app-navigation__link--active{% endif %}" href="{{ site.baseurl }}/getting-started/">Getting started</a>
        </li>
        <li class="app-navigation__list-item">
          <a class="app-navigation__link{% if page.url == '/faq/' %} app-navigation__link--active{% endif %}" href="{{ site.baseurl }}/faq/">FAQ</a>
        </li>
      </ul>
    </div>
  </nav>

  <div class="govuk-width-container">
    <main class="govuk-main-wrapper" id="main-content" role="main">
      <div class="govuk-grid-row">
        <div class="govuk-grid-column-two-thirds">
          {{ content }}
        </div>
      </div>
    </main>
  </div>

  <footer class="govuk-footer" role="contentinfo">
    <div class="govuk-width-container">
      <div class="govuk-footer__meta">
        <div class="govuk-footer__meta-item govuk-footer__meta-item--grow">
          <span class="govuk-footer__licence-description">
            Built by the Platform Team.
            <a class="govuk-footer__link" href="https://github.com/bv90dsit/platform-services/issues/new?template=question.yml">Ask a question</a> |
            <a class="govuk-footer__link" href="https://github.com/bv90dsit/platform-services/issues/new?template=feature-request.yml">Request a feature</a>
          </span>
        </div>
      </div>
    </div>
  </footer>
</body>
</html>
